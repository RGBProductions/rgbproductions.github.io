<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Portfolio</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="projects.css">
</head>
<body>
    <div id="lights" style="transition: transform 3s ease-out;">
        <div class="light" style="width: 768px; height: 768px; background-color: red; transform: translate(-512px, -128px); animation-delay: 0s;"></div>
        <div class="light" style="width: 768px; height: 768px; background-color: lime; transform: translate(512px, 384px); animation-delay: 0.25s;"></div>
        <div class="light" style="width: 768px; height: 768px; background-color: blue; transform: translate(-384px, 896px); animation-delay: 0.5s;"></div>
    </div>

    <main>
        <h1>Projects</h1>
        
        <h2>User Experience Design</h2>

        <div class="project-row">
            <button class="project" onclick="openProject('canesSignUp')">
                <div class="project-header">
                    <h1>Raising Cane's</h1>
                    <h2>Caniac Club Sign-Up</h2>
                </div>
                <div class="project-thumbnail-wrapper">
                    <img src="./img/projects/canes.png" alt="Raising Cane's" class="project-thumbnail">
                </div>
            </button>
            
            <button class="project" onclick="openProject('jurassicPark')">
                <div class="project-header">
                    <h1>Jurassic Park</h1>
                    <h2>Exhibits Page</h2>
                </div>
                <div class="project-thumbnail-wrapper">
                    <img src="./img/projects/jp.png" alt="Jurassic Park" class="project-thumbnail">
                </div>
            </button>
            
            <button class="project" onclick="openProject('outbreakOutlook')">
                <div class="project-header">
                    <h1>Outbreak Outlook</h1>
                    <h2>Community Project</h2>
                </div>
                <div class="project-thumbnail-wrapper">
                    <img src="./img/projects/oo.png" alt="Outbreak Outlook" class="project-thumbnail">
                </div>
            </button>
        </div>
        
        <h2>Game Development</h2>

        <div class="project-row">
            <button class="project" onclick="openProject('slash')">
                <div class="project-header">
                    <h1>The Slash of the Dice</h1>
                    <h2>GMTK Game Jam 2022 submission</h2>
                </div>
                <div class="project-thumbnail-wrapper">
                    <img src="./img/projects/slash.png" alt="The Slash of the Dice" class="project-thumbnail">
                </div>
            </button>
        </div>
    </main>

    <div class="contain-center">
        <div id="pages-bar">
            <a class="page-button" tabindex="1" href="./home">Home<div class="underline"></div></a>
            <a class="page-button" tabindex="2" href="./about">About Me<div class="underline"></div></a>
            <a class="page-button" tabindex="3" href="./projects">Projects<div class="underline"></div></a>
        </div>
    </div>

    <button id="menu-opener" onclick="openMenu()"></button>
    <div id="menu">
        <button id="menu-closer" onclick="closeMenu()"></button>
        <div id="menu-buttons">
            <a class="page-button" href="./home">Home<div class="underline"></div></a>
            <a class="page-button" href="./about">About Me<div class="underline"></div></a>
            <a class="page-button" href="./projects">Projects<div class="underline"></div></a>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="projects.js"></script>
</body>
</html>
